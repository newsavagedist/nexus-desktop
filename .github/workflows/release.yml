name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<'EOF'
          ## Como instalar

          Só precisas de um destes três, conforme o teu sistema:

          | Sistema | Ficheiro |
          |---|---|
          | macOS (Apple Silicon) | `DaazNexus-*-arm64.dmg` |
          | Windows | `DaazNexus-Setup-*.exe` |
          | Linux | `DaazNexus-*.AppImage` (portátil) ou `nexus-desktop_*.deb` |

          Os restantes ficheiros (`.blockmap`, `.yml`, e o `.zip` do Mac) não são para descarregar — são usados automaticamente pela app para aplicar atualizações em segundo plano.

          No Mac, para evitar os avisos do Gatekeeper, usa o script `install-mac.command` (dentro de `extras.zip`) em vez de abrir o `.dmg` diretamente.
          EOF
          gh release create "${{ github.ref_name }}" --repo newsavagedist/nexus-desktop --draft --title "${{ github.ref_name }}" --notes-file release-notes.md \
            || gh release edit "${{ github.ref_name }}" --repo newsavagedist/nexus-desktop --notes-file release-notes.md

      - name: Package extras (Mac install script)
        run: zip -j extras.zip install-mac.command

      - name: Upload extras asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" extras.zip --repo newsavagedist/nexus-desktop --clobber

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install renderer dependencies
        run: npm ci
        working-directory: src/renderer

      - name: Build
        run: npm run build

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux AppImage deb --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win nsis --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Mac)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac dmg zip --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          SKIP_NOTARIZE: true
